events {
    worker_connections 1024;  # max connections
}

http {
    # ============ BASIC SECURITY ============
    
    server_tokens off;  # hide Nginx version in responses (reduces fingerprinting)
    
    client_max_body_size 10M;  # max request body size (protects from huge uploads).
    client_body_timeout 12;  # timeouts for reading request body/headers under.
    client_header_timeout 12;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # ============ UPSTREAM SERVICES ============
    
    upstream gateway {
        server gateway:3000;
    }
    
    upstream frontend {
        server frontend:5173;
    }

    upstream game_server {
        server game-server:3005;
    }

    # ============ REDIRECT HTTP → HTTPS ============
    
    server {
        listen 80;
        server_name _;  # accept any host on port 80

        return 301 https://$host$request_uri;  # Redirect from port 80 to https
    }

    # ============ SERVEUR HTTPS PRINCIPAL ============
    
    server {
        listen 443 ssl;         # ||
        server_name _;  # Accept any hostname (SNI will still validate certificate against client request)

        # Preserve port in redirects
        absolute_redirect off;
        port_in_redirect on;

        # -------- SSL Certificates --------
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        
        # -------- SSL securized config --------
        ssl_protocols TLSv1.2 TLSv1.3;  # only allow secure TLS versions (no SSLv3, TLS 1.0/1.1)
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;  # strong cipher suites only
        ssl_prefer_server_ciphers off;  # let client choose cipher (modern best practice)
        ssl_session_cache shared:SSL:10m;  # cache SSL sessions for performance (10MB shared across workers)
        ssl_session_timeout 1d;  # keep cached sessions for 1 day

        # -------- Security headers --------
        add_header X-Frame-Options "SAMEORIGIN" always;  # prevent clickjacking (page can only be framed by same origin)
        add_header X-Content-Type-Options "nosniff" always;  # prevent MIME type sniffing attacks
        add_header X-XSS-Protection "1; mode=block" always;  # enable browser XSS filter (legacy but still useful)
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;  # control how much referrer info is sent
        # HSTS - décommenter en prod avec vrai certificat
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # force HTTPS for 1 year

        # ============ API's ROUTES (to Gateway) ============
        
        # Auth routes (rate limit more strict)
        location /auth/ {
            limit_req zone=auth_limit burst=10 nodelay;  # stricter rate limit: 5r/s + burst of 10, no delay
            
            proxy_pass http://gateway;  # forward request to gateway upstream
            proxy_http_version 1.1;  # use HTTP/1.1 for keepalive and websocket support
            proxy_set_header Host $host;  # preserve original Host header
            proxy_set_header X-Real-IP $remote_addr;  # pass real client IP to backend
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # append client IP to forwarded chain
            proxy_set_header X-Forwarded-Proto $scheme;  # tell backend if original request was http or https
        }
        
        # Users, Game, Chat routes
        location /users/ {
            limit_req zone=api_limit burst=20 nodelay;  # rate limit: 10r/s + burst of 20
            
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /game/ {
            limit_req zone=api_limit burst=20 nodelay;  # rate limit: 10r/s + burst of 20
            
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /chat/ {
            limit_req zone=api_limit burst=20 nodelay;  # rate limit: 10r/s + burst of 20
            
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            
            proxy_set_header Upgrade $http_upgrade;  # pass Upgrade header for WebSocket handshake
            proxy_set_header Connection "upgrade";  # tell backend to upgrade connection to WebSocket
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 86400;  # 24h timeout to keep WebSocket connections alive
        }
        
        location /matchmaking/ {
            limit_req zone=api_limit burst=20 nodelay;  # rate limit: 10r/s + burst of 20
            
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /health {
            proxy_pass http://gateway;  # simple proxy to gateway health endpoint
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ============ GAME SERVER WEBSOCKET ============
        
        location /game-ws {
            proxy_pass http://game_server;
            proxy_http_version 1.1;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 86400;  # 24h timeout for WebSocket
        }

        # ============ FRONTEND SPA ROUTES ============
        # Exact matches for SPA routes that conflict with API prefixes
        # These must come before the API location blocks
        
        location = /game {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============ FRONTEND (SPA) ============
        
        location / {
            proxy_pass http://frontend;  # forward to Vite dev server
            proxy_http_version 1.1;
            
            # Support HMR (Hot Module Replacement) de Vite
            proxy_set_header Upgrade $http_upgrade;  # needed for Vite HMR WebSocket
            proxy_set_header Connection "upgrade";  # upgrade connection for HMR
            
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /picture/ {
            alias /var/www/picture/;
            expires 30d;
        }
    }
}
